<!DOCTYPE html>
<html>
<head>
<!-- optional, only if you want Socket.IO transport -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
<script src="browsers.umd.js" crossorigin="anonymous"></script>
<script type="module">
  // Use the default logger
  defaultLogger.info("Hello from the browser");

  // Or make your own instance
  const lm = new LogMachine("my_logger", {
    debug_level: 0,
    central: {
      url: "https://logmachine.bufferpunk.com",
      room: "public",
      headers: {},
      // socketio: true,
    },
  });

  lm.success("All green!", location.pathname);
  lm.error("Something went wrong", location.pathname);

  // Export logs (optional)
  lm.download("my-logs.txt");
</script>
<title>Test Logger</title>
</head>
<body></body>
</html>
